[app]
name = "sculptor"
version = "0.1.0"
description = "AI coding agent by Imbue (packaged release)"

[runtime]
type = "serverfull"

[runtime.container]
image = "openhost/Dockerfile"
port = 8080

[routing]
health_check = "/health"

[resources]
memory_mb = 2048
cpu_millicores = 2000

[data]
app_data = true
app_temp_data = true

[services.secrets]
keys = [
    { key = "ANTHROPIC_API_KEY", reason = "Claude Code API access for the AI coding agent", required = true },
    { key = "GIT_USER_NAME", reason = "Git commit author name", required = true },
    { key = "GIT_USER_EMAIL", reason = "Git commit author email", required = true },
    { key = "GITHUB_ACCESS_TOKEN", reason = "GitHub personal access token for cloning/pushing repos", required = false },
    { key = "GITLAB_ACCESS_TOKEN", reason = "GitLab personal access token for cloning/pushing repos", required = false },
]
