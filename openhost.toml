[app]
name = "sculptor"
version = "0.1.0"
description = "AI coding agent by Imbue (packaged release)"

[runtime]
type = "serverfull"

[runtime.container]
image = "openhost/Dockerfile"
port = 8080

[[ports]]
label = "static-http"
container_port = 8081
host_port = 0  # auto-assign

[[ports]]
label = "udp-echo"
container_port = 9000
host_port = 0  # auto-assign

[routing]
health_check = "/health"

[resources]
memory_mb = 2048
cpu_millicores = 2000

[data]
app_data = true
app_temp_data = true

[[services.v2.consumes]]
service = "github.com/imbue-openhost/openhost/services/secrets"
shortname = "secrets"
version = ">=0.1.0"
grants = [
    { key = "ANTHROPIC_API_KEY" },
    { key = "GIT_USER_NAME" },
    { key = "GIT_USER_EMAIL" },
    { key = "GITHUB_ACCESS_TOKEN" },
    { key = "GITLAB_ACCESS_TOKEN" },
]
